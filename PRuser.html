<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CATSSTAC · 数据监控平台</title>
    <style>
        /* 重置与基础变量 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;  /* 移动端顶部对齐更自然 */
            min-height: 100vh;
            margin: 12px;             /* 四周留小边距 */
        }

        /* 主卡片 — 移动端几乎占满宽度，圆角略小 */
        .card {
            max-width: 100%;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 25px -8px rgba(0, 0, 0, 0.1);
            padding: 20px 16px;
            transition: all 0.2s ease;
        }

        /* 头部 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            font-size: 1.6rem;        /* 移动端稍小 */
            font-weight: 600;
            background: linear-gradient(135deg, #0f172a, #334155);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }

        .badge {
            background: #e2e8f0;
            color: #1e293b;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .badge span {
            background: #0f172a;
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            margin-left: 4px;
        }

        /* 工具栏：加号按钮区域 */
        .toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 18px;
        }

        .plus-button {
            width: 52px;
            height: 52px;
            background: #0f172a;
            border: none;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 18px -5px rgba(15, 23, 42, 0.3);
            transition: all 0.2s ease;
            border: 2px solid #ffffff;
        }

        .plus-button:hover {
            background: #1e293b;
            transform: scale(1.02);
        }

        .plus-button:active {
            transform: scale(0.96);
        }

        .plus-button svg {
            width: 26px;
            height: 26px;
            stroke: white;
            stroke-width: 2.5;
        }

        /* 表格容器 — 允许横向滚动，移动端友好 */
        .table-wrapper {
            border-radius: 18px;
            border: 1px solid #e9eef2;
            overflow-x: auto;          /* 关键：小屏幕横向滑动 */
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            -webkit-overflow-scrolling: touch; /* 顺滑滚动 */
        }

        /* 表格本身 — 宽度自动，列宽由内容撑开，保证每行完整 */
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 620px;          /* 保证六列能较舒适显示，过小时滑动 */
            font-size: 0.85rem;         /* 基础字体稍小 */
        }

        th {
            background: #f8fafc;
            color: #1e293b;
            font-weight: 600;
            font-size: 0.75rem;         /* 移动端表头更紧凑 */
            text-transform: uppercase;
            letter-spacing: 0.03em;
            padding: 14px 10px;
            text-align: left;
            border-bottom: 1px solid #dde3e9;
            white-space: nowrap;         /* 表头不换行 */
        }

        td {
            padding: 14px 10px;
            border-bottom: 1px solid #edf2f6;
            color: #1e293b;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* 视频链接样式 (小标签形式) */
        .video-link-cell a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #eef2ff;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            transition: background 0.15s;
            white-space: nowrap;         /* 防止链接换行 */
        }

        .video-link-cell a:hover {
            background: #dbeafe;
        }

        .cost-cell {
            font-weight: 500;
            color: #0f172a;
            white-space: nowrap;
        }

        /* 删除按钮小巧 */
        .delete-btn {
            background: none;
            border: 1px solid #e2e8f0;
            color: #64748b;
            cursor: pointer;
            font-size: 0.7rem;
            padding: 5px 10px;
            border-radius: 30px;
            transition: all 0.15s;
            font-weight: 500;
            white-space: nowrap;
        }

        .delete-btn:hover {
            background: #fee2e2;
            border-color: #f87171;
            color: #b91c1c;
        }

        /* 空状态提示 */
        .empty-row td {
            text-align: center;
            padding: 36px 10px;
            color: #94a3b8;
            font-style: italic;
            font-size: 0.9rem;
        }

        /* 模态框 (移动端弹窗) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(3px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;              /* 保证小屏边缘留白 */
        }

        .modal-container {
            background: white;
            width: 100%;
            max-width: 400px;            /* 适中宽度，手机几乎满宽 */
            border-radius: 28px;
            padding: 24px 20px;
            box-shadow: 0 30px 40px -15px #0f172a;
            animation: modalPop 0.2s ease;
        }

        @keyframes modalPop {
            0% { opacity: 0.7; transform: scale(0.96); }
            100% { opacity: 1; transform: scale(1); }
        }

        .modal-container h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 20px;
            letter-spacing: -0.01em;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            background: #ffffff;
            transition: border 0.15s, box-shadow 0.15s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #0f172a;
            box-shadow: 0 0 0 3px #e2e8f0;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 28px;
            flex-wrap: wrap;             /* 按钮换行留余地 */
        }

        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            flex: 1 1 auto;              /* 移动端按钮平均分配宽度 */
            min-width: 120px;
            text-align: center;
        }

        .btn-primary {
            background: #0f172a;
            color: white;
            box-shadow: 0 4px 8px #b0c4db;
        }

        .btn-primary:hover {
            background: #1e293b;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #1e293b;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .footnote {
            margin-top: 18px;
            font-size: 0.7rem;
            color: #64748b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .footnote .dot {
            width: 6px;
            height: 6px;
            background: #94a3b8;
            border-radius: 50%;
            display: inline-block;
        }

        /* 小屏幕极窄设备下额外微调 (例如宽度 < 400px) */
        @media (max-width: 400px) {
            .card {
                padding: 16px 12px;
            }
            .header h1 {
                font-size: 1.4rem;
            }
            .plus-button {
                width: 48px;
                height: 48px;
            }
            .plus-button svg {
                width: 24px;
                height: 24px;
            }
            th, td {
                padding: 10px 8px;
            }
            .delete-btn {
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>📊 CATSSTAC · PR部</h1>
            <div class="badge">
                PR 专用
                <span>v1.0</span>
            </div>
        </div>

        <!-- 独立的加号按钮 -->
        <div class="toolbar">
            <button class="plus-button" id="openModalBtn" aria-label="新增条目">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>

        <!-- 可横向滑动的统计列表 -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>博主ID</th>
                        <th>成本 (¥)</th>
                        <th>视频链接</th>
                        <th>带货单品</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- 动态渲染 -->
                </tbody>
            </table>
        </div>

        <!-- 底部提示 -->
        <div class="footnote">
            <span>⚡ 点击 + 新增</span>
            <span class="dot"></span>
            <span>序号按添加顺序</span>
        </div>
    </div>

    <!-- 模态框 - 新增条目弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-container">
            <h2>✎ 新建条目</h2>
            <div class="input-group">
                <label>博主ID</label>
                <input type="text" id="influencerId" placeholder="例如：李二桃" autocomplete="off">
            </div>
            <div class="input-group">
                <label>成本 ( ¥ )</label>
                <input type="number" id="costInput" placeholder="例如：5999" step="0.01" min="0">
            </div>
            <div class="input-group">
                <label>抖音视频链接</label>
                <input type="url" id="videoLink" placeholder="https://v.douyin.com/OBVOTGtwc70/">
            </div>
            <div class="input-group">
                <label>带货单品（全称）</label>
                <input type="text" id="productName" placeholder="例如：哈灵顿二代">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelModalBtn">取消</button>
                <button class="btn btn-primary" id="confirmAddBtn">确定</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 数据存储 (含两条演示数据) ----------
            let entries = [
                {
                    id: '李二桃',
                    cost: '5999.00',
                    link: 'https://v.douyin.com/OBVOTGtwc70/',
                    product: '哈灵顿二代'
                },
                {
                    id: 'ygqqqqqq',
                    cost: '2999',
                    link: 'https://www.douyin.com/video/7616649495849774706',
                    product: '幽灵水洗帆布夹克'
                }
            ];

            // ---------- DOM 元素 ----------
            const tbody = document.getElementById('tableBody');
            const openModalBtn = document.getElementById('openModalBtn');
            const modalOverlay = document.getElementById('modalOverlay');
            const cancelModalBtn = document.getElementById('cancelModalBtn');
            const confirmAddBtn = document.getElementById('confirmAddBtn');

            const influencerInput = document.getElementById('influencerId');
            const costInput = document.getElementById('costInput');
            const linkInput = document.getElementById('videoLink');
            const productInput = document.getElementById('productName');

            // ---------- 辅助函数 ----------
            function normalizeUrl(url) {
                if (!url) return '#';
                url = url.trim();
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    return 'https://' + url;
                }
                return url;
            }

            // 渲染表格 (使用DOM构建，安全)
            function renderTable() {
                tbody.innerHTML = '';

                if (entries.length === 0) {
                    const emptyRow = document.createElement('tr');
                    emptyRow.className = 'empty-row';
                    emptyRow.innerHTML = '<td colspan="6">✨ 暂无数据，点击右上角加号添加视频记录</td>';
                    tbody.appendChild(emptyRow);
                    return;
                }

                for (let i = 0; i < entries.length; i++) {
                    const entry = entries[i];
                    const tr = document.createElement('tr');

                    // 序号列
                    const tdIndex = document.createElement('td');
                    tdIndex.style.fontWeight = '600';
                    tdIndex.style.color = '#475569';
                    tdIndex.textContent = (i + 1).toString();
                    tr.appendChild(tdIndex);

                    // 博主ID
                    const tdId = document.createElement('td');
                    tdId.textContent = entry.id || '—';
                    tr.appendChild(tdId);

                    // 成本 (格式化两位小数)
                    const tdCost = document.createElement('td');
                    tdCost.className = 'cost-cell';
                    let costValue = entry.cost;
                    if (!isNaN(parseFloat(costValue)) && isFinite(costValue)) {
                        costValue = parseFloat(costValue).toFixed(2);
                    }
                    tdCost.textContent = costValue ? `¥ ${costValue}` : '—';
                    tr.appendChild(tdCost);

                    // 抖音视频链接 (可点击)
                    const tdLink = document.createElement('td');
                    tdLink.className = 'video-link-cell';
                    if (entry.link) {
                        const link = normalizeUrl(entry.link);
                        const a = document.createElement('a');
                        a.href = link;
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';
                        a.innerHTML = '🔗 抖音视频链接';
                        a.title = entry.link;
                        tdLink.appendChild(a);
                    } else {
                        tdLink.textContent = '—';
                    }
                    tr.appendChild(tdLink);

                    // 单品全名
                    const tdProduct = document.createElement('td');
                    tdProduct.textContent = entry.product || '—';
                    tr.appendChild(tdProduct);

                    // 操作：删除按钮
                    const tdAction = document.createElement('td');
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.textContent = '删除';
                    deleteBtn.setAttribute('data-index', i);
                    tdAction.appendChild(deleteBtn);
                    tr.appendChild(tdAction);

                    tbody.appendChild(tr);
                }
            }

            // 打开弹窗并清空表单
            function openModal() {
                influencerInput.value = '';
                costInput.value = '';
                linkInput.value = '';
                productInput.value = '';
                modalOverlay.style.display = 'flex';
            }

            function closeModal() {
                modalOverlay.style.display = 'none';
            }

            function addEntryFromModal() {
                const influencer = influencerInput.value.trim();
                const cost = costInput.value.trim();
                const link = linkInput.value.trim();
                const product = productInput.value.trim();

                if (!influencer || !cost || !link || !product) {
                    alert('请完整填写博主ID、成本、链接和单品全名');
                    return;
                }

                if (isNaN(parseFloat(cost)) || !isFinite(cost)) {
                    alert('成本必须为有效数字');
                    return;
                }

                entries.push({
                    id: influencer,
                    cost: cost,
                    link: link,
                    product: product
                });

                renderTable();
                closeModal();
            }

            // ---------- 事件绑定 ----------
            tbody.addEventListener('click', function(e) {
                const target = e.target;
                if (target.classList.contains('delete-btn')) {
                    const index = target.getAttribute('data-index');
                    if (index !== null) {
                        const idx = parseInt(index, 10);
                        if (!isNaN(idx) && idx >= 0 && idx < entries.length) {
                            entries.splice(idx, 1);
                            renderTable();
                        }
                    }
                }
            });

            openModalBtn.addEventListener('click', openModal);
            cancelModalBtn.addEventListener('click', closeModal);

            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) {
                    closeModal();
                }
            });

            confirmAddBtn.addEventListener('click', addEntryFromModal);

            // 弹窗内回车支持
            const modalInputs = [influencerInput, costInput, linkInput, productInput];
            modalInputs.forEach(input => {
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        addEntryFromModal();
                    }
                });
            });

            // 初始化
            renderTable();
        })();
    </script>
</body>
</html>
