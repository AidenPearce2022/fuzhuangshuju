<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>潮数实验室 · 自媒体数据分析</title>
    <!-- Font Awesome 6 (免费版，包含tiktok等潮流图标) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        body {
            background: #0b0b0f;
            background-image: radial-gradient(circle at 20% 30%, #2a1a4a 0%, #0a0a0f 80%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 16px 12px;
            color: #ffffff;
        }

        /* 手机卡片容器 */
        .dashboard {
            max-width: 460px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 标题区 + 小涂鸦 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
        }
        .header h1 {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(130deg, #ffb347, #ff6b9d, #a05fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 0 15px #ff6b9d80;
        }
        .graffiti {
            font-size: 2rem;
            filter: drop-shadow(0 0 8px cyan);
            opacity: 0.7;
            rotate: 8deg;
        }

        /* 通用卡片风格 — 毛玻璃+霓虹边 */
        .card {
            background: rgba(18, 18, 28, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 120, 200, 0.3);
            border-radius: 32px;
            padding: 16px 18px;
            box-shadow: 0 10px 30px -10px #ff44aa40, inset 0 0 20px #ffffff08;
        }

        /* 按钮组通用 */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 8px 0 4px;
        }
        .btn-group .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 80, 180, 0.6);
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #eee;
            box-shadow: 0 0 10px #ff44aa20;
            transition: all 0.15s;
            flex: 0 1 auto;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .btn-group .btn i {
            font-size: 1.1rem;
            color: #ffb2d9;
        }
        .btn-group .btn.active {
            background: #ff3b9b;
            border-color: #fff;
            color: white;
            box-shadow: 0 0 25px #ff3b9b, 0 4px 10px black;
            border-width: 2px;
        }
        .btn-group .btn.active i {
            color: white;
        }
        .btn-group .btn:active {
            transform: scale(0.96);
        }

        /* 水平滑动容器 (用于平台过滤按钮, 手机触摸) */
        .scroll-x {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding: 4px 0 12px;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .scroll-x::-webkit-scrollbar {
            display: none;
        }
        .scroll-x .btn {
            flex: 0 0 auto;
        }

        /* 账号切换区 (加一点小装饰) */
        .account-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .platform-badge {
            background: #ffb34730;
            border-radius: 50px;
            padding: 4px 12px;
            font-size: 0.8rem;
            border: 1px solid #ffb347;
        }

        /* 四个核心指标卡片 */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 8px 0;
        }
        .metric-item {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 28px;
            padding: 18px 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 200, 100, 0.3);
            box-shadow: inset 0 0 40px #ff842610;
            text-align: center;
        }
        .metric-value {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.2;
            background: linear-gradient(135deg, #fff8, #ffd5b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .metric-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #bbb;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .metric-label i {
            color: #ffaa70;
        }

        /* 平台卡片区 (下单平台) */
        .platform-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 12px;
        }
        .platform-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 26px;
            padding: 16px;
            border: 1px solid #ff55b080;
            box-shadow: 0 0 20px #ff44aa10;
            transition: 0.1s;
        }
        .platform-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .platform-name {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .platform-name i {
            font-size: 1.6rem;
            width: 32px;
            color: #ffb7d2;
        }
        .orders-count {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #fbd07c, #ff8aa1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .progress-bar-bg {
            background: #2f2f3f;
            height: 8px;
            border-radius: 20px;
            overflow: hidden;
            margin: 10px 0 6px;
        }
        .progress-fill {
            height: 8px;
            border-radius: 20px;
            background: linear-gradient(90deg, #f97e8a, #ffd271, #b77ef0);
            width: 0%;
            box-shadow: 0 0 12px #ffaeff;
        }
        .platform-sub {
            display: flex;
            justify-content: space-between;
            color: #aaa;
            font-size: 0.75rem;
        }

        /* 视频小衣服标记 */
        .product-tag {
            display: inline-block;
            background: #b45eff30;
            border-radius: 40px;
            padding: 6px 14px;
            margin-top: 6px;
            font-size: 0.8rem;
            border: 1px dashed #ff84d5;
            color: #ffcfcf;
        }
        .product-tag i {
            margin-right: 6px;
        }

        /* 底部装饰 */
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #aaa;
            letter-spacing: 2px;
            margin-top: 25px;
            border-top: 1px solid #ff44aa30;
            padding-top: 20px;
        }

        /* 工具类 */
        .space-y-8 > * + * { margin-top: 8px; }
        .text-glow { text-shadow: 0 0 12px magenta; }
        .flex-row { display: flex; align-items: center; gap: 6px; }
    </style>
</head>
<body>
    <div class="dashboard" id="app">

        <!-- 头部潮流氛围 -->
        <div class="header">
            <h1>CATSSTAC · 数据中心</h1>
            <div class="graffiti">🔥👕</div>
        </div>

        <!-- 账号切换 (自媒体平台 + IP账号) 用按钮组 -->
        <div class="card" style="padding: 14px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                <span style="color:#ffb8d9;"><i class="fa-regular fa-user"></i> 切换自媒体账号</span>
                <span class="platform-badge" id="active-account-platform">抖音</span>
            </div>
            <div class="btn-group" id="accountBtns">
                <!-- 动态JS生成两个账号按钮 -->
            </div>
        </div>

        <!-- 爆款视频切换区 (带衣服产品标签) -->
        <div class="card">
            <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 6px;">
                <i class="fa-solid fa-play" style="color: #ff5eaa;"></i>
                <span style="font-weight: 200;">爆款视频·选择</span>
            </div>
            <div class="btn-group" id="videoBtns">
                <!-- 动态视频按钮 A B C -->
            </div>
            <!-- 当前视频主推潮流衣服展示 -->
            <div id="currentProductTag" class="product-tag">
                <i class="fa-solid fa-shirt"></i> 印花卫衣
            </div>
        </div>

        <!-- 核心指标卡片 (完播率 评论 曝光 成单) -->
        <div class="card">
            <div style="display: flex; gap: 10px; margin-bottom: 4px;">
                <i class="fa-regular fa-chart-line"></i> 视频表现
            </div>
            <div class="metrics-grid" id="metricCards">
                <!-- 由js填充四个卡片 -->
            </div>
        </div>

        <!-- 下单平台转化区 (带过滤按钮) -->
        <div class="card">
            <div style="display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px;">
                <span><i class="fa-regular fa-bag-shopping"></i> 下单平台转化</span>
                <!-- 平台过滤按钮 可滚动 -->
                <div class="scroll-x" id="platformFilter">
                    <!-- 全部 淘宝 抖音 快手 小红书 -->
                </div>
            </div>
            <!-- 平台卡片动态渲染区 -->
            <div id="platformList" class="platform-grid">
                <!-- JS 填充 -->
            </div>
        </div>

        <!-- 潮流注脚 -->
        <div class="footer-note">
            <span># 街头数据实验室 #</span>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 潮流模拟数据 ----------
            // 两个自媒体账号 (不同平台)
            const accounts = [
                {
                    id: 'acc1',
                    name: 'CATSSTAC官方',
                    platform: '抖音',
                    platformIcon: 'fa-brands fa-tiktok',
                    videos: [
                        { 
                            title: '爆款A · 雾都卫衣', 
                            product: '哈灵顿二代', 
                            productIcon: '🧥',
                            completion: 0.82, comments: 3400, exposure: 123000, orders: 215,
                            platforms: { taobao: 90, douyin: 60, kuaishou: 30, xiaohongshu: 35 }
                        },
                        { 
                            title: '爆款B · 工装降落', 
                            product: '荆棘刺绣', 
                            productIcon: '👖',
                            completion: 0.65, comments: 2800, exposure: 98000, orders: 178,
                            platforms: { taobao: 70, douyin: 50, kuaishou: 28, xiaohongshu: 30 }
                        },
                        { 
                            title: '爆款C · 联名限定', 
                            product: '圆牛冲锋裤', 
                            productIcon: '🧥',
                            completion: 0.91, comments: 5600, exposure: 210000, orders: 412,
                            platforms: { taobao: 180, douyin: 130, kuaishou: 52, xiaohongshu: 50 }
                        }
                    ]
                },
                {
                    id: 'acc2',
                    name: '阿泷个人号',
                    platform: '小红书',
                    platformIcon: 'fa-regular fa-note-sticky', // 代替小红书图标
                    videos: [
                        { 
                            title: '爆款A · 美式卫衣', 
                            product: '幽灵帆布夹克', 
                            productIcon: '👕',
                            completion: 0.78, comments: 5200, exposure: 189000, orders: 307,
                            platforms: { taobao: 120, douyin: 95, kuaishou: 42, xiaohongshu: 50 }
                        },
                        { 
                            title: '爆款B · 百褶裙裤', 
                            product: '墨竹条纹西裤', 
                            productIcon: '👗',
                            completion: 0.88, comments: 7100, exposure: 265000, orders: 520,
                            platforms: { taobao: 200, douyin: 160, kuaishou: 70, xiaohongshu: 90 }
                        },
                        { 
                            title: '爆款C · 立体T恤', 
                            product: '玄烬灰', 
                            productIcon: '👕',
                            completion: 0.71, comments: 3900, exposure: 147000, orders: 268,
                            platforms: { taobao: 100, douyin: 80, kuaishou: 33, xiaohongshu: 55 }
                        }
                    ]
                }
            ];

            // 下单平台展示配置 (用于过滤与显示)
            const platformConfig = [
                { key: 'taobao', label: '淘宝', icon: 'fa-brands fa-taobao' },
                { key: 'douyin', label: '抖音', icon: 'fa-brands fa-tiktok' },  // 抖音用tiktok占位，风格无碍
                { key: 'kuaishou', label: '快手', icon: 'fa-brands fa-snapchat' }, // 快手无官方，用幽灵占位
                { key: 'xiaohongshu', label: '小红书', icon: 'fa-regular fa-bookmark' }
            ];

            // 当前选中的账号索引、视频索引、平台过滤条件
            let currentAccIdx = 0;
            let currentVideoIdx = 0;
            let currentPlatformFilter = 'all';   // 'all', 'taobao', 'douyin', ...

            // 获取当前视频数据
            function getCurrentVideo() {
                return accounts[currentAccIdx].videos[currentVideoIdx];
            }

            // 格式化数字 (k, w)
            function formatNumber(num) {
                if (num >= 100000) return (num / 10000).toFixed(1) + 'w';
                if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
                return num.toString();
            }

            // 渲染账号按钮、视频按钮、所有卡片 + 平台过滤
            function renderEverything() {
                renderAccountButtons();
                renderVideoButtons();
                renderMetricCards();
                renderPlatformFilterButtons();
                renderPlatformCards();
                updateProductTag();
                updateAccountPlatformBadge();
            }

            // 更新右上角平台小徽章
            function updateAccountPlatformBadge() {
                const badge = document.getElementById('active-account-platform');
                if (badge) {
                    badge.innerText = accounts[currentAccIdx].platform;
                }
            }

            // 账号按钮生成
            function renderAccountButtons() {
                const container = document.getElementById('accountBtns');
                if (!container) return;
                container.innerHTML = '';
                accounts.forEach((acc, idx) => {
                    const btn = document.createElement('button');
                    btn.className = `btn ${idx === currentAccIdx ? 'active' : ''}`;
                    btn.innerHTML = `<i class="${acc.platformIcon}"></i> ${acc.name}`;
                    btn.dataset.index = idx;
                    btn.addEventListener('click', () => {
                        if (currentAccIdx !== idx) {
                            currentAccIdx = idx;
                            currentVideoIdx = 0;        // 切换账号默认第一个视频
                            currentPlatformFilter = 'all'; // 重置过滤
                            renderEverything();
                        }
                    });
                    container.appendChild(btn);
                });
            }

            // 视频按钮 (A/B/C)
            function renderVideoButtons() {
                const container = document.getElementById('videoBtns');
                if (!container) return;
                container.innerHTML = '';
                const videos = accounts[currentAccIdx].videos;
                videos.forEach((video, idx) => {
                    const btn = document.createElement('button');
                    btn.className = `btn ${idx === currentVideoIdx ? 'active' : ''}`;
                    // 使用衣服表情让界面更潮
                    btn.innerHTML = `${video.productIcon} 爆款${String.fromCharCode(65 + idx)}`; // A,B,C
                    btn.dataset.index = idx;
                    btn.addEventListener('click', () => {
                        if (currentVideoIdx !== idx) {
                            currentVideoIdx = idx;
                            currentPlatformFilter = 'all'; // 切换视频重置过滤
                            renderEverything();
                        }
                    });
                    container.appendChild(btn);
                });
            }

            // 产品tag更新 (当前视频主推)
            function updateProductTag() {
                const tagDiv = document.getElementById('currentProductTag');
                if (!tagDiv) return;
                const v = getCurrentVideo();
                tagDiv.innerHTML = `<i class="fa-regular fa-star"></i> 主推 · ${v.productIcon} ${v.product}`;
            }

            // 指标卡片渲染 (完播率, 评论, 曝光, 成单)
            function renderMetricCards() {
                const grid = document.getElementById('metricCards');
                if (!grid) return;
                const v = getCurrentVideo();
                const completionPercent = Math.round(v.completion * 100) + '%';
                const commentsFormatted = formatNumber(v.comments);
                const exposureFormatted = formatNumber(v.exposure);
                const ordersFormatted = formatNumber(v.orders);

                grid.innerHTML = `
                    <div class="metric-item">
                        <div class="metric-value">${completionPercent}</div>
                        <div class="metric-label"><i class="fa-regular fa-circle-check"></i> 完播率</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-value">${commentsFormatted}</div>
                        <div class="metric-label"><i class="fa-regular fa-message"></i> 评论</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-value">${exposureFormatted}</div>
                        <div class="metric-label"><i class="fa-regular fa-eye"></i> 曝光</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-value">${ordersFormatted}</div>
                        <div class="metric-label"><i class="fa-regular fa-cart-shopping"></i> 成单</div>
                    </div>
                `;
            }

            // 平台过滤按钮 (全部,淘宝,抖音,快手,小红书)
            function renderPlatformFilterButtons() {
                const container = document.getElementById('platformFilter');
                if (!container) return;
                container.innerHTML = '';

                // 全部按钮
                const allBtn = document.createElement('button');
                allBtn.className = `btn ${currentPlatformFilter === 'all' ? 'active' : ''}`;
                allBtn.innerHTML = '<i class="fa-regular fa-grid-2"></i> 全部';
                allBtn.addEventListener('click', () => {
                    currentPlatformFilter = 'all';
                    renderPlatformCards();
                    renderPlatformFilterButtons(); // 刷新高亮
                });
                container.appendChild(allBtn);

                // 各平台按钮
                platformConfig.forEach(p => {
                    const btn = document.createElement('button');
                    btn.className = `btn ${currentPlatformFilter === p.key ? 'active' : ''}`;
                    btn.innerHTML = `<i class="${p.icon}"></i> ${p.label}`;
                    btn.addEventListener('click', () => {
                        currentPlatformFilter = p.key;
                        renderPlatformCards();
                        renderPlatformFilterButtons();
                    });
                    container.appendChild(btn);
                });
            }

            // 绘制下单平台卡片 (依据过滤条件)
            function renderPlatformCards() {
                const container = document.getElementById('platformList');
                if (!container) return;
                const video = getCurrentVideo();
                const platformOrders = video.platforms;
                const totalOrders = video.orders;

                // 决定要展示哪些平台key
                let displayedPlatforms = [];
                if (currentPlatformFilter === 'all') {
                    displayedPlatforms = platformConfig.map(p => p.key);
                } else {
                    // 如果过滤的key存在，就展示那一个 (但需要确保key有效)
                    if (platformConfig.some(p => p.key === currentPlatformFilter)) {
                        displayedPlatforms = [currentPlatformFilter];
                    } else {
                        displayedPlatforms = []; // fallback
                    }
                }

                if (displayedPlatforms.length === 0) {
                    container.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;">暂无该平台数据</div>';
                    return;
                }

                let htmlStr = '';
                displayedPlatforms.forEach(key => {
                    const config = platformConfig.find(p => p.key === key);
                    if (!config) return;
                    const orderValue = platformOrders[key] || 0;
                    const percent = totalOrders > 0 ? (orderValue / totalOrders) * 100 : 0;
                    // 平台显示名称和图标
                    htmlStr += `
                        <div class="platform-card">
                            <div class="platform-row">
                                <span class="platform-name">
                                    <i class="${config.icon}"></i> ${config.label}
                                </span>
                                <span class="orders-count">${orderValue}</span>
                            </div>
                            <div class="progress-bar-bg">
                                <div class="progress-fill" style="width: ${percent}%;"></div>
                            </div>
                            <div class="platform-sub">
                                <span>占成单 ${percent.toFixed(1)}%</span>
                                <span><i class="fa-regular fa-arrow-trend-up"></i> 转化</span>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = htmlStr;
            }

            // 初始化所有事件、首次渲染
            document.addEventListener('DOMContentLoaded', () => {
                renderEverything();
            });

        })();
    </script>
</body>
</html>
